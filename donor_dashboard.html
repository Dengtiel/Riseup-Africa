<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Donor Dashboard – Riseup Africa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="assets/css/styles.css" rel="stylesheet">
  </head>
  <body class="bg-light text-dark">
    <header class="site-header py-4">
      <div class="container d-flex align-items-center justify-content-between">
  <h1 class="h5 mb-0">Riseup Africa · Donor Dashboard</h1>
        <div class="d-flex align-items-center gap-2">
          <a id="profileIcon" class="btn btn-sm btn-outline-secondary d-none" href="profile.html" title="Your profile"><i class="bi bi-person-circle"></i></a>
        </div>
      </div>
    </header>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img src="assets/images/help-africa-now.png" alt="Riseup Africa" class="brand-logo brand-logo--large" onerror="this.onerror=null;this.src='assets/images/logo-ra.svg'" />
          <span class="brand-name ms-2">Riseup Africa</span>
        </a>
        <form class="d-none d-md-flex ms-3 nav-search">
          <div class="input-group">
            <input class="form-control form-control-sm" placeholder="Search youth, opportunities..." aria-label="Search">
            <button class="btn btn-outline-secondary btn-sm" type="button"><i class="bi bi-search"></i></button>
          </div>
        </form>
        <div class="ms-auto d-flex align-items-center gap-2">
          <button id="themeToggle" class="btn btn-sm btn-light" title="Toggle theme"><i class="bi bi-moon-fill"></i></button>
          <a id="loginBtn" class="btn btn-sm btn-outline-primary login-extended" href="#">Log in</a>
        </div>
      </div>
    </nav>

    <main class="container my-4">
    <script>
    // Ensure donors are logged in before using this page — if not, show login modal
    (async function(){
      try{
        var r = await fetch('/api/me');
        var j = await r.json();
        if(!j.authenticated){
          // show login modal so user can sign in or register
          var modalEl = document.getElementById('loginModal');
          if(modalEl){ var m = new bootstrap.Modal(modalEl); m.show(); }
        }
      }catch(e){ console.error('auth check error', e); }
    })();
    </script>
      <div class="row g-3">
        <div class="col-lg-6">
          <div class="card shadow-sm" data-aos="fade-up">
            <div class="card-body">
              <h5 class="card-title">Post an Opportunity</h5>
              <form id="opportunityForm" class="row g-2">
                <div class="col-12"><input id="oppTitle" class="form-control" placeholder="e.g., STEM Scholarship 2025" required /></div>
                <div class="col-md-6"><select id="oppCategory" class="form-select"><option>Refugee</option><option>IDP</option><option>Vulnerable</option><option>PWD</option><option>All</option></select></div>
                <div class="col-md-6"><input id="oppLocation" class="form-control" placeholder="Any / Specific Country" /></div>
                <div class="col-12"><textarea id="oppDescription" class="form-control" rows="4" placeholder="Description"></textarea></div>
                <div class="col-12">
                  <label class="form-label small">Attachment (optional)</label>
                  <input id="oppAttachment" type="file" class="form-control form-control-sm" accept="application/pdf,image/*" />
                </div>
                <div class="col-12"><button id="publishBtn" type="submit" class="btn btn-primary">Publish</button></div>
              </form>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card shadow-sm" data-aos="fade-up" data-aos-delay="120">
            <div class="card-body">
              <h5 class="card-title">Search Verified Youth</h5>
              <div class="row g-2">
                <div class="col-12 col-md-6"><select class="form-select"><option>All</option><option>Refugee</option><option>IDP</option><option>Vulnerable</option><option>PWD</option></select></div>
                <div class="col-12 col-md-6"><input class="form-control" placeholder="e.g., Kenya" /></div>
                <div class="col-12"><input class="form-control" placeholder="e.g., Kakuma" /></div>
                <div class="col-12 mt-2"><button class="btn btn-outline-primary">Search</button></div>
              </div>
              <hr />
              <h6>Results</h6>
              <div class="table-responsive">
                <table class="table table-hover">
                  <thead><tr><th>Youth</th><th>Category</th><th>Location</th><th>Verification</th></tr></thead>
                  <tbody>
                    <tr><td>Amina K.</td><td>Refugee</td><td>Kakuma, Kenya</td><td><span class="badge bg-success">Verified</span></td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

  <footer class="text-center text-muted py-3"><div class="container small">Donor Dashboard · Riseup Africa</div></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Login modal -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Sign in to Riseup Africa</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="loginForm">
              <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" required></div>
              <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" required></div>
              <div class="d-flex justify-content-between align-items-center">
                <a href="#" class="small">Forgot?</a>
                <button type="submit" class="btn btn-primary">Sign in</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
    // handle opportunity post
    (function(){
      var form = document.getElementById('opportunityForm');
      if(!form) return;
      form.addEventListener('submit', async function(ev){
        ev.preventDefault();
        var btn = document.getElementById('publishBtn');
        var orig = btn.innerHTML;

        // ensure user is authenticated — call /api/me
        try{
          var meRes = await fetch('/api/me');
          var me = await meRes.json();
          if(!me.authenticated){
            // save pending payload then show login modal and stop
            window.pendingOpportunity = payload;
            var modalEl = document.getElementById('loginModal');
            if(modalEl){ var m = new bootstrap.Modal(modalEl); m.show(); }
            return;
          }
        }catch(e){ console.warn('Could not verify auth', e); }

        btn.disabled = true; btn.innerHTML = 'Publishing...';
        var payload = {
          title: document.getElementById('oppTitle').value,
          location: document.getElementById('oppLocation').value,
          description: document.getElementById('oppDescription').value,
          category: document.getElementById('oppCategory').value
        };
        try{
          var res = await fetch('/api/opportunities', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
          var j = await res.json();
          if(res.status === 201){
            // if an attachment was selected, upload it to the new opportunity
            try{
              var fileInput = document.getElementById('oppAttachment');
              if(fileInput && fileInput.files && fileInput.files.length){
                var fd = new FormData(); fd.append('file', fileInput.files[0]);
                await fetch('/api/opportunities/'+encodeURIComponent(j.id)+'/upload', {method: 'POST', body: fd, credentials: 'same-origin'});
                // reload the created object to ensure attachment URL is available to other tabs
              }
            }catch(e){ console.warn('Attachment upload failed', e); }
            // notify other open tabs (youth dashboard) via localStorage and go to detail page for the new opportunity
            try{ localStorage.setItem('haf_new_opportunity', JSON.stringify(j)); }catch(e){}
            window.location.href = 'opportunity_detail.html?id=' + encodeURIComponent(j.id);
          } else if(res.status === 401){
            // session expired or not logged in — save payload and show login modal
            window.pendingOpportunity = payload;
            var modalEl = document.getElementById('loginModal');
            if(modalEl){ var m = new bootstrap.Modal(modalEl); m.show(); }
          } else {
            alert('Error creating opportunity: '+(j.error||res.statusText));
          }
        }catch(e){ console.error(e); alert('Network error'); }
        btn.disabled = false; btn.innerHTML = orig;
      });
    })();
    </script>
  </body>
</html>
