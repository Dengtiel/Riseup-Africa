<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile Upload – Riseup Africa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="assets/css/styles.css" rel="stylesheet">
  </head>
  <body class="bg-light text-dark">
    <header class="site-header py-4">
      <div class="container d-flex align-items-center justify-content-between">
  <h1 class="h5 mb-0">Riseup Africa · Create Profile</h1>
      </div>
    </header>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img src="assets/images/help-africa-now.png" alt="Riseup Africa" class="brand-logo brand-logo--large" onerror="this.onerror=null;this.src='assets/images/logo-ra.svg'" />
          <span class="brand-name ms-2">Riseup Africa</span>
        </a>
        <form class="d-none d-md-flex ms-3 nav-search">
          <div class="input-group">
            <input class="form-control form-control-sm" placeholder="Search youth, opportunities..." aria-label="Search">
            <button class="btn btn-outline-secondary btn-sm" type="button"><i class="bi bi-search"></i></button>
          </div>
        </form>
        <div class="ms-auto d-flex align-items-center gap-2">
          <a id="profileIconNav" class="btn btn-sm btn-outline-secondary d-none" href="profile.html" title="Your profile"><i class="bi bi-person-circle"></i></a>
        </div>
        <div class="ms-auto d-flex align-items-center gap-2 d-flex d-lg-none">
          <button id="themeToggleMobile" class="btn btn-sm btn-light" title="Toggle theme"><i class="bi bi-moon-fill"></i></button>
          <a id="loginBtnMobile" class="btn btn-sm btn-outline-primary login-extended" href="#">Log in</a>
        </div>
        <div class="ms-auto d-flex align-items-center gap-2 d-none d-lg-flex">
          <button id="themeToggle" class="btn btn-sm btn-light" title="Toggle theme"><i class="bi bi-moon-fill"></i></button>
          <a id="loginBtn" class="btn btn-sm btn-outline-primary login-extended" href="#">Log in</a>
        </div>
      </div>
    </nav>

    <main class="container my-4">
      <div class="card shadow-sm" data-aos="fade-up">
        <div class="card-body">
          <h5 class="card-title">Create Profile & Upload Verification</h5>
          <form id="profileForm" class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input class="form-control" placeholder="e.g., Amina K." name="fullName" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Category</label>
              <select class="form-select" name="category"><option>Refugee</option><option>IDP</option><option>Vulnerable</option><option>PWD</option></select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Country</label>
              <input class="form-control" placeholder="e.g., Kenya" name="country" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Camp/Community</label>
              <input class="form-control" placeholder="e.g., Kakuma" name="camp" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Upload ID/Transcript</label>
              <input class="form-control" type="file" name="docs" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Upload Recommendation Letter (PDF)</label>
              <input class="form-control" type="file" name="letter" accept="application/pdf" />
            </div>
            <div class="col-12">
              <label class="form-label">Letter Issuer</label>
              <input class="form-control" name="issuer" placeholder="Camp/Community Chairperson Name" />
            </div>
            <div class="col-12">
              <label class="form-label">Additional Notes</label>
              <textarea class="form-control" rows="3" name="notes" placeholder="Optional context for verification"></textarea>
            </div>
            <div class="col-12 d-flex gap-2">
              <button class="btn btn-primary" type="submit">Submit for Verification</button>
              <a class="btn btn-outline-secondary" href="index.html">Save Draft</a>
            </div>
            <div class="col-12">
              <p class="small text-muted">By submitting, you consent to field verification by platform staff.</p>
            </div>
          </form>
        </div>
      </div>
    </main>

  <footer class="text-center text-muted py-3"><div class="container small">Profile Upload · Riseup Africa</div></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Login modal -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Sign in to Riseup Africa</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="loginForm">
              <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" required></div>
              <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" required></div>
              <div class="d-flex justify-content-between align-items-center">
                <a href="#" class="small">Forgot?</a>
                <button type="submit" class="btn btn-primary">Sign in</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
